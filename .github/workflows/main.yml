name: Run Telegram Bot

on:
  schedule:
    - cron: "*/5 * * * *"   # every 5 minutes
  workflow_dispatch:         # manual run button

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout repo
        uses: actions/checkout@v3

      - name: 🟢 Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: "20"

      - name: 📦 Install dependencies
        run: |
          npm install node-telegram-bot-api axios csv-parser json2csv cloudinary streamifier

      - name: 🚀 Run bot (60 seconds)
        run: |
          timeout 60 node app.js
