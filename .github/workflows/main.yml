name: Telegram Lead Bot

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout Repo
        uses: actions/checkout@v3

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20

      - name: 📦 Install Dependencies
        run: |
          npm install node-telegram-bot-api axios csv-parser json2csv@5 cloudinary p-limit

      - name: 🚀 Run Bot
        run: node app.js